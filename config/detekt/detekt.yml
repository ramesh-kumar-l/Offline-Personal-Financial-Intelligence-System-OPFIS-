build:
  maxIssues: 0

style:
  MagicNumber:
    active: false
  ReturnCount:
    active: true
    max: 3

complexity:
  LongParameterList:
    functionThreshold: 6
    constructorThreshold: 8
  TooManyFunctions:
    thresholdInClasses: 15

comments:
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false

naming:
  FunctionNaming:
    excludes: ['**/commonTest/**', '**/androidTest/**', '**/desktopTest/**']
    ignoreAnnotated: ['Composable']
  MatchingDeclarationName:
    # KMP `actual` files are conventionally named `Foo.android.kt` /
    # `Foo.desktop.kt` (matching ktlint's `ktlint_standard_filename =
    # disabled` in .editorconfig for the same reason) - the platform
    # suffix never matches the declaration name 1:1.
    active: false
