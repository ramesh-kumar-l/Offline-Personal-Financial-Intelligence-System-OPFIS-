name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # NOTE: the Gradle wrapper jar (gradle/wrapper/gradle-wrapper.jar)
      # is not committed yet - it is a binary that must be generated by
      # running `gradle wrapper` once a JDK/Gradle is available locally
      # (see README "Toolchain setup"). Until then, CI installs Gradle
      # directly instead of invoking ./gradlew.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"

      - name: Lint (ktlint)
        run: gradle ktlintCheck

      - name: Static analysis (detekt)
        run: gradle detekt

      - name: Unit tests
        run: gradle allTests

      - name: Assemble
        run: gradle assemble
